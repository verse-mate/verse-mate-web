<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>VerseMate — Feature Splash Mockups</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=Roboto+Serif:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&display=swap" rel="stylesheet" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
  body { background: #555; padding: 40px; display: flex; flex-wrap: wrap; gap: 40px; font-family: 'Roboto', system-ui, sans-serif; }

  .frame {
    width: 390px; height: 844px; position: relative; overflow: hidden;
    display: flex; flex-direction: column;
    padding: 26px 24px 28px;
    background: var(--bg); color: var(--fg);
  }

  /* ---- THEME TOKENS (mirrors src/styles/prototype.css) ---- */
  .theme-light {
    --bg:#FAF6EA; --surface:#FFFFFF; --border:#EDE7D8; --divider:#EDE7D8;
    --fg:#1B1B1B; --fg-2:rgba(27,27,27,0.62); --fg-3:rgba(27,27,27,0.45);
    --gold:#B0892F; --gold-soft:#A98E5E;
    --header-bg:#FAF6EA; --pill-active:rgba(27,27,27,0.06); --pill-inactive:rgba(27,27,27,0.55); --chrome-fg:#1B1B1B;
    --scripture:rgba(27,27,27,0.20);
    --shadow:0 14px 44px rgba(27,27,27,0.14); --preview-border:#EDE7D8;
    --sketch-bg:#EFE9D8; --sketch-ink:#3a3526; --video-tint:rgba(27,27,27,0.35);
    --btn-fg:#FAF6EA;
  }
  .theme-dark {
    --bg:#000000; --surface:#323232; --border:#3a3a3a; --divider:#2a2a2a;
    --fg:#E7E7E7; --fg-2:rgba(231,231,231,0.70); --fg-3:rgba(231,231,231,0.45);
    --gold:#CFA94E; --gold-soft:#B6A06E;
    --header-bg:#000000; --pill-active:rgba(255,255,255,0.07); --pill-inactive:rgba(231,231,231,0.55); --chrome-fg:#E7E7E7;
    --scripture:rgba(231,231,231,0.16);
    --shadow:0 16px 48px rgba(0,0,0,0.55); --preview-border:#2c2c2c;
    --sketch-bg:#E9E3D2; --sketch-ink:#2b2620; --video-tint:rgba(0,0,0,0.45);
    --btn-fg:#1B1B1B;
  }

  /* ---- SPLASH CHROME ---- */
  .topbar { display:flex; align-items:center; justify-content:space-between; height:34px; flex:0 0 auto; }
  .brand { display:flex; align-items:center; gap:8px; font-weight:600; font-size:15px; letter-spacing:.01em; }
  .brand .dot { width:16px; height:16px; border-radius:50%; background:var(--gold); box-shadow:0 0 0 3px color-mix(in srgb, var(--gold) 22%, transparent); }
  .skip { font-size:14px; color:var(--fg-3); font-weight:500; }

  .preview {
    flex:0 0 auto; height:466px; margin-top:0; border-radius:22px; overflow:hidden;
    border:1px solid var(--preview-border); box-shadow:var(--shadow); position:relative;
    background:var(--bg);
  }

  .copy { flex:1 1 auto; display:flex; flex-direction:column; justify-content:flex-start; padding-top:30px; }
  .eyebrow { color:var(--gold); font-size:12px; font-weight:700; letter-spacing:.16em; text-transform:uppercase; }
  .title { font-family:'Roboto Serif', Georgia, serif; font-weight:600; font-size:26px; line-height:31px; margin-top:12px; color:var(--fg); letter-spacing:-0.01em; }
  .desc { font-size:15px; line-height:23px; color:var(--fg-2); margin-top:12px; max-width:320px; }

  .footer { flex:0 0 auto; display:flex; align-items:center; justify-content:space-between; margin-top:18px; }
  .dots { display:flex; gap:7px; align-items:center; }
  .dots i { width:7px; height:7px; border-radius:9px; background:var(--fg-3); display:block; }
  .dots i.on { width:22px; background:var(--gold); }
  .cta { background:var(--gold); color:var(--btn-fg); border:none; border-radius:11px; padding:13px 24px; font-family:'Roboto',sans-serif; font-size:15px; font-weight:600; letter-spacing:.01em; }

  /* =================== FEATURE 1 : LEXICON =================== */
  .lex-scene { position:absolute; inset:0; background:var(--bg); }
  .lex-scripture { position:absolute; inset:0; padding:26px 24px; font-family:Georgia,'Times New Roman',serif; font-size:19px; line-height:31px; color:var(--scripture); overflow:hidden; }
  .lex-card {
    position:absolute; left:50%; top:30px; transform:translateX(-50%);
    width:300px; background:var(--surface); border:1px solid var(--border); border-radius:14px;
    box-shadow:0 22px 60px rgba(0,0,0,0.30); overflow:hidden;
  }
  .lex-head { padding:14px 16px 11px; border-bottom:1px solid var(--divider); }
  .lex-lemma { font-family:Georgia,'Times New Roman',serif; font-size:23px; font-weight:500; color:var(--fg); }
  .lex-translit { font-size:14px; color:var(--gold-soft); font-weight:500; margin-left:9px; }
  .lex-meta { margin-top:5px; font-size:12px; color:var(--fg-3); }
  .lex-sec { padding:12px 16px; border-bottom:1px solid var(--divider); }
  .lex-sec.tint { background:color-mix(in srgb, var(--gold-soft) 8%, transparent); }
  .lex-label { font-size:10px; font-weight:600; letter-spacing:.09em; color:var(--gold-soft); text-transform:uppercase; margin-bottom:6px; }
  .lex-body { font-size:14px; line-height:20px; color:var(--fg); }
  .lex-list { list-style:none; }
  .lex-list li { font-size:13px; line-height:21px; color:var(--fg); padding-left:2px; }
  .lex-related { display:flex; flex-direction:column; gap:7px; }
  .lex-rel-lemma { font-family:Georgia,serif; font-size:15px; color:var(--fg); }
  .lex-rel-tr { font-size:12px; color:var(--gold-soft); margin-left:7px; }
  .lex-rel-note { font-size:13px; color:var(--fg-2); margin-top:1px; }

  /* =================== SHARED : PILL BAR =================== */
  .chrome { background:var(--header-bg); padding:14px 14px 12px; display:flex; align-items:center; gap:10px; }
  .pills { flex:1; display:flex; align-items:center; gap:2px; background:transparent; }
  .pill { flex:1; text-align:center; font-size:13px; font-weight:500; color:var(--pill-inactive); padding:7px 4px; border-radius:9px; white-space:nowrap; }
  .pill.active { color:var(--gold); background:var(--pill-active); font-weight:600; }
  .ham { width:22px; height:22px; display:flex; flex-direction:column; justify-content:center; gap:4px; flex:0 0 auto; }
  .ham span { height:2px; width:20px; background:var(--chrome-fg); border-radius:2px; }

  /* =================== FEATURE 2 : STUDY =================== */
  .study-body { padding:18px 16px; }
  .study-eyebrow { font-size:11px; font-weight:700; letter-spacing:.10em; text-transform:uppercase; color:var(--gold); }
  .study-card { margin-top:14px; background:var(--surface); border:1px solid var(--border); border-left:2px solid var(--gold); border-radius:10px; padding:14px 15px; }
  .study-card-head { display:flex; align-items:center; justify-content:space-between; }
  .study-card-title { font-size:15px; font-weight:600; color:var(--fg); }
  .study-prose { font-family:'Roboto Serif',Georgia,serif; font-size:14px; line-height:22px; color:var(--fg-2); margin-top:10px; }
  .chev { color:var(--fg-3); font-size:12px; }
  .step { display:flex; gap:12px; padding:14px 4px 14px 0; border-top:1px solid var(--divider); }
  .step:first-of-type { border-top:none; }
  .step-num { flex:0 0 auto; width:26px; height:26px; border-radius:50%; background:var(--gold); color:var(--btn-fg); font-size:13px; font-weight:700; display:flex; align-items:center; justify-content:center; }
  .step-main { flex:1; }
  .step-row { display:flex; align-items:center; justify-content:space-between; }
  .step-title { font-size:15px; font-weight:600; color:var(--fg); }
  .step-cap { font-family:'Roboto Serif',Georgia,serif; font-style:italic; font-size:13px; line-height:20px; color:var(--fg-2); margin-top:5px; }

  /* =================== FEATURE 3 : VISUALS =================== */
  .vis-body { padding:16px 16px 0; }
  .vis-titlerow { display:flex; align-items:center; justify-content:space-between; }
  .vis-title { font-family:'Roboto Serif',Georgia,serif; font-size:21px; font-weight:600; color:var(--fg); }
  .vis-actions { display:flex; gap:14px; color:var(--fg-2); }
  .icon { width:18px; height:18px; display:block; }
  .vis-card { margin-top:14px; border-radius:13px; overflow:hidden; border:1px solid var(--border); position:relative; }
  .sketch { position:relative; height:168px; background:var(--sketch-bg); overflow:hidden; }
  .sketch svg { position:absolute; inset:0; width:100%; height:100%; }
  .sketch-title { position:absolute; top:14px; left:0; right:0; text-align:center; font-family:'Roboto',sans-serif; font-weight:700; font-size:21px; letter-spacing:.04em; color:var(--sketch-ink); }
  .sketch-sub { position:absolute; bottom:12px; left:0; right:0; text-align:center; font-size:9px; font-weight:600; letter-spacing:.08em; color:var(--sketch-ink); opacity:.8; }
  .play { position:absolute; left:50%; top:46%; transform:translate(-50%,-50%); width:58px; height:58px; border-radius:50%; background:rgba(255,255,255,0.92); display:flex; align-items:center; justify-content:center; box-shadow:0 4px 16px rgba(0,0,0,0.3); }
  .play::after { content:''; border-left:18px solid #1B1B1B; border-top:11px solid transparent; border-bottom:11px solid transparent; margin-left:4px; }
  .vid-overlay { position:absolute; inset:0; background:linear-gradient(180deg, transparent 40%, var(--video-tint) 100%); }
  .vid-cap { position:absolute; left:0; right:0; bottom:0; padding:12px 14px; }
  .vid-cap h4 { color:#fff; font-size:18px; font-weight:600; text-align:center; text-shadow:0 1px 4px rgba(0,0,0,0.6); }
  .vid-cap p { color:rgba(255,255,255,0.88); font-size:11px; text-align:center; text-shadow:0 1px 3px rgba(0,0,0,0.6); margin-top:2px; }
  .cc { position:absolute; right:8px; bottom:8px; background:rgba(0,0,0,0.55); color:#e9d9a8; font-size:9px; font-weight:600; padding:3px 7px; border-radius:5px; }
  .vis-card.imgcard { margin-top:14px; }
  .imgcard .sketch { height:150px; }
  .imgcard-cap { padding:11px 14px; font-size:14px; font-weight:500; color:var(--fg); background:var(--surface); }
  .vis-peek { margin-top:14px; height:46px; border-radius:13px 13px 0 0; border:1px solid var(--border); border-bottom:none; background:var(--sketch-bg); display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:600; letter-spacing:.06em; color:var(--sketch-ink); opacity:.85; }
</style>
</head>
<body>
<div id="root"></div>
<script>
const SCRIPTURE = `Consider it all joy, my brethren, when you encounter various trials, knowing that the testing of your faith produces endurance. And let endurance have its perfect result, so that you may be perfect and complete, lacking in nothing. But if any of you lacks wisdom, let him ask of God, who gives to all generously and without reproach, and it will be given to him.`;

function lexicon() {
  return `
  <div class="lex-scene">
    <div class="lex-scripture">${SCRIPTURE}</div>
    <div class="lex-card">
      <div class="lex-head">
        <div><span class="lex-lemma">ἁπλῶς</span><span class="lex-translit">haplōs</span></div>
        <div class="lex-meta">Adverb &middot; G574 &middot; hap-LOSE &middot; 1&times; in NT</div>
      </div>
      <div class="lex-sec">
        <div class="lex-label">Basic sense</div>
        <div class="lex-body">generously / single-mindedly / without reservation</div>
      </div>
      <div class="lex-sec">
        <div class="lex-label">Semantic range</div>
        <ul class="lex-list">
          <li>&bull;&nbsp; simply, without duplicity</li>
          <li>&bull;&nbsp; liberally, generously</li>
          <li>&bull;&nbsp; with sincere openness</li>
        </ul>
      </div>
      <div class="lex-sec">
        <div class="lex-label">Related</div>
        <div class="lex-related">
          <div>
            <span class="lex-rel-lemma">ἁπλοῦς</span><span class="lex-rel-tr">haplous</span>
            <div class="lex-rel-note">adjective — single, undivided</div>
          </div>
          <div>
            <span class="lex-rel-lemma">ἁπλότης</span><span class="lex-rel-tr">haplotēs</span>
            <div class="lex-rel-note">noun — sincerity, generosity</div>
          </div>
        </div>
      </div>
    </div>
  </div>`;
}

function pills(active) {
  const items = ['Summary','By Line','Study','Visuals'];
  return `<div class="chrome">
    <div class="pills">${items.map(t=>`<div class="pill ${t===active?'active':''}">${t}</div>`).join('')}</div>
    <div class="ham"><span></span><span></span><span></span></div>
  </div>`;
}

function study() {
  return `
  ${pills('Study')}
  <div class="study-body">
    <div class="study-eyebrow">Observation — 9 Inductive Steps</div>
    <div class="study-card">
      <div class="study-card-head">
        <div class="study-card-title">About the nine observation steps</div>
        <div class="chev">▲</div>
      </div>
      <div class="study-prose">Observation asks what the text <i>says</i> — slowing down to mark the keywords, contrasts, repetitions, and structural cues the author left for you.</div>
    </div>
    <div style="margin-top:6px">
      <div class="step">
        <div class="step-num">1</div>
        <div class="step-main">
          <div class="step-row"><div class="step-title">Begin with prayer</div><div class="chev">▼</div></div>
          <div class="step-cap">Apart from the Holy Spirit's illumination this is just a method.</div>
        </div>
      </div>
      <div class="step">
        <div class="step-num">2</div>
        <div class="step-main">
          <div class="step-row"><div class="step-title">Ask the 5 W's and an H</div><div class="chev">▼</div></div>
          <div class="step-cap">Setting the table — author, audience, occasion.</div>
        </div>
      </div>
      <div class="step">
        <div class="step-num">3</div>
        <div class="step-main">
          <div class="step-row"><div class="step-title">Mark key words and phrases</div><div class="chev">▼</div></div>
          <div class="step-cap">Repeated words carry the author's purpose. Counting them shows what James is fixing in your mind.</div>
        </div>
      </div>
    </div>
  </div>`;
}

// Faux hand-drawn whiteboard sketch (placeholder for BibleProject artwork).
function sketchSVG() {
  return `<svg viewBox="0 0 360 168" preserveAspectRatio="none">
    <g stroke="var(--sketch-ink)" stroke-width="1.4" fill="none" opacity="0.55" stroke-linecap="round">
      <path d="M20 70 q14 -16 28 0 t28 0"/>
      <circle cx="44" cy="108" r="9"/>
      <path d="M44 117 l0 20 M44 124 l-10 6 M44 124 l10 6 M44 137 l-8 14 M44 137 l8 14"/>
      <rect x="120" y="92" width="54" height="40" rx="3"/>
      <path d="M120 92 l27 -16 l27 16"/>
      <circle cx="300" cy="60" r="11"/>
      <path d="M300 71 l0 22 M300 78 l-11 7 M300 78 l11 7 M300 93 l-9 16 M300 93 l9 16"/>
      <path d="M220 120 q20 -14 40 0" />
      <path d="M250 40 l8 -14 l8 14 z"/>
      <path d="M30 150 q40 -10 80 0 t80 0 t80 0"/>
    </g>
  </svg>`;
}

function visuals() {
  return `
  ${pills('Visuals')}
  <div class="vis-body">
    <div class="vis-titlerow">
      <div class="vis-title">Visuals for James 1</div>
      <div class="vis-actions">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="11" height="11" rx="2"/><path d="M5 15V5a2 2 0 0 1 2-2h10"/></svg>
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 12v7a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-7"/><path d="M12 16V3M8 7l4-4 4 4"/></svg>
      </div>
    </div>

    <div class="vis-card">
      <div class="sketch">
        ${sketchSVG()}
        <div class="sketch-title">THE LETTER OF JAMES</div>
        <div class="sketch-sub">12 TEACHINGS · WHOLEHEARTED DEVOTION TO JESUS</div>
      </div>
      <div class="vid-overlay"></div>
      <div class="play"></div>
      <div class="vid-cap">
        <h4>James — Overview</h4>
        <p>BibleProject overview · animated explainer</p>
      </div>
      <div class="cc">BibleProject · CC BY-SA 4.0</div>
    </div>

    <div class="vis-card imgcard">
      <div class="sketch">
        ${sketchSVG()}
        <div class="sketch-title">THE LETTER OF JAMES</div>
        <div class="sketch-sub">INTRODUCTION · READ SCRIPTURE</div>
        <div class="cc">BibleProject · CC BY-SA 4.0</div>
      </div>
      <div class="imgcard-cap">BibleProject — Read Scripture: James</div>
    </div>

    <div class="vis-peek">INSIGHT FOR LIVING MINISTRIES</div>
  </div>`;
}

const FEATURES = [
  {
    eyebrow: 'Original Languages',
    title: 'Greek & Hebrew, one tap away',
    desc: 'Tap any highlighted word to reveal its original-language definition — Strong’s number, pronunciation, semantic range, and related words. Read Scripture in the language it was written.',
    cta: 'Next', dot: 0, render: lexicon,
  },
  {
    eyebrow: 'Guided Study',
    title: 'The inductive method, step by step',
    desc: 'Work through the proven 9-step Precept method: observe what the text says, interpret what it means, then apply it. Each chapter unfolds as guided, collapsible steps.',
    cta: 'Next', dot: 1, render: study,
  },
  {
    eyebrow: 'Visual Learning',
    title: 'See the whole book at a glance',
    desc: 'Watch animated overviews and explore hand-drawn visual summaries for every book — from BibleProject, Insight for Living, and VerseMate originals. Tap any image to zoom in.',
    cta: 'Start reading', dot: 2, render: visuals,
  },
];

function frame(theme, f) {
  const dots = [0,1,2].map(i=>`<i class="${i===f.dot?'on':''}"></i>`).join('');
  return `<div class="frame theme-${theme}" data-shot="${f.dot+1}-${theme}">
    <div class="preview">${f.render()}</div>
    <div class="copy">
      <div class="eyebrow">${f.eyebrow}</div>
      <div class="title">${f.title}</div>
      <div class="desc">${f.desc}</div>
    </div>
    <div class="footer">
      <div class="dots">${dots}</div>
      <button class="cta">${f.cta}</button>
    </div>
  </div>`;
}

const root = document.getElementById('root');
let html = '';
for (const theme of ['light','dark']) {
  for (const f of FEATURES) html += frame(theme, f);
}
root.innerHTML = html;
</script>
</body>
</html>
