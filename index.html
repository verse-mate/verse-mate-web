<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>VerseMate — Bible Reading Companion</title>
    <link rel="icon" type="image/png" href="/versemate-icon.png" />
    <!-- iOS Safari ignores the generic <link rel="icon"> for the tab/bookmark
         strip and home-screen icon; it strictly wants apple-touch-icon. Without
         it iOS shows a placeholder triangle in the tab list. -->
    <link rel="apple-touch-icon" href="/versemate-icon.png" />
    <meta name="apple-mobile-web-app-title" content="VerseMate" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <!-- Android Chrome / Edge tab + status-bar tint to match the dark UI. -->
    <meta name="theme-color" content="#1B1B1B" />
    <meta name="description" content="A clean, reverent mobile Bible reading app with bookmarks, notes, highlights, and cross-references.">

    <meta property="og:type" content="website" />
    <meta property="og:title" content="VerseMate — Bible Reading Companion">
    <meta property="og:description" content="A clean, reverent mobile Bible reading app with bookmarks, notes, highlights, and cross-references.">
    <!-- og:image is what iOS Safari, Messages, WhatsApp, etc. render in the
         share-sheet preview thumbnail. Without it the share UI falls back to
         the page's favicon — or, in the iOS share sheet, the generic Safari
         compass icon. Point it at the same book mark we use for the favicon
         + apple-touch-icon. -->
    <meta property="og:image" content="/versemate-icon.png">
    <meta property="og:image:type" content="image/png">
    <meta property="og:image:alt" content="VerseMate book icon">

    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="VerseMate — Bible Reading Companion">
    <meta name="twitter:description" content="A clean, reverent mobile Bible reading app with bookmarks, notes, highlights, and cross-references.">
    <meta name="twitter:image" content="/versemate-icon.png">
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
