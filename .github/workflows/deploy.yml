name: Deploy

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
    inputs:
      env:
        description: Cloudflare env to deploy
        type: choice
        required: true
        default: production
        options:
          - preview
          - staging
          - production

# Cancel in-flight runs for the same branch — last push wins
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  # Pick the env based on trigger:
  #   - manual (workflow_dispatch): user picks
  #   - push to main: production
  #   - PR: preview (gets a per-PR workers.dev URL)
  CLOUDFLARE_ENV: |-
    ${{
      github.event_name == 'workflow_dispatch' && inputs.env
      || github.event_name == 'pull_request' && 'preview'
      || github.ref == 'refs/heads/main' && 'production'
      || 'preview'
    }}

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.23

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type-check
        run: bunx tsc --noEmit

      - name: Build SPA
        env:
          # Build-time env vars baked into the bundle. Real values come
          # from repo secrets in production; placeholders below mirror
          # the monorepo's apps/lovable build step (Phase 1 of FE
          # migration set these up).
          VITE_API_URL: https://api.versemate.org
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID || '94126503648-2fb9dakdfi8pmi8ep78bk5nsrv94db6o.apps.googleusercontent.com' }}
          VITE_POSTHOG_KEY: ${{ secrets.VITE_POSTHOG_KEY || 'phc_UhHXkLHgiD6916hYZgaKy9pjOOlZi9sTRic3RhWWLRC' }}
          VITE_POSTHOG_HOST: https://us.i.posthog.com
          VITE_POSTHOG_SESSION_REPLAY: ${{ env.CLOUDFLARE_ENV == 'production' && 'true' || 'false' }}
        run: bunx vite build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 1
          if-no-files-found: error

  deploy:
    name: Deploy (${{ github.event_name == 'pull_request' && 'preview' || 'main' }})
    needs: build
    runs-on: ubuntu-latest
    # On PRs we still deploy to preview workers.dev for review; on main
    # this runs production.
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Deploy to Cloudflare Workers
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          # Pin to v4 — v3 doesn't parse wrangler.jsonc (only .toml)
          wranglerVersion: "4.85.0"
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --env ${{ env.CLOUDFLARE_ENV }}

      - name: Comment PR with preview URL
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const url = 'https://verse-mate-web-preview.workers.dev';
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🚀 Preview deployed to ${url}`
            });
